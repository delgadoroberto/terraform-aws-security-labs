name: Checkov IaC Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Action
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/aws/
          framework: terraform
          # Generate both CLI output for console and SARIF for GitHub Security tab
          output_format: cli,sarif
          output_file_path: console,results.sarif
          # Set to true to allow the workflow to finish and upload the SARIF report
          soft_fail: true

      - name: Upload SARIF results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
