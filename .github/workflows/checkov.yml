name: Checkov IaC Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Checkov Action
        uses: bridgecrewio/checkov-action@master
        with:
          # Target the AWS folder directly to ignore Azure and GCP
          directory: aws/
          framework: terraform
          # Optional: Uncomment to prevent pipeline failure during remediation
          # soft_fail: true
