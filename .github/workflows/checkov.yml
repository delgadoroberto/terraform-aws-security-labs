name: Checkov AWS Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  scan:
    runs-on: Ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Checkov (AWS Only)
        name: Test security
        uses: bridgecrewio/checkov-action@master
        with:
          # Scan only the AWS directory, bypassing Azure and GCP
          directory: aws/
          # Optional: Uncomment to prevent pipeline failure during remediation
          # soft_fail: true 
          framework: terraform
